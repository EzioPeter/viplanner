# planning
main_freq:              10
image_flip:             True
conv_dist:              0.5
is_sim:                 False
# newwork model
model_save:             /models/plannernet_real.pt
crop_size:              [360, 640]
uint_type:              True
# images and gaol waypoint topics
depth_topic:            /depth_camera_front_upper/depth/image_rect_raw
goal_topic:             /mp_waypoint
path_topic:             /path
image_topic:            /path_image
camera_tilt:            0.18
depth_max:              10.0
# frame ids
robot_id:               base
world_id:               odom
# fear reaction
is_fear_act:            True
buffer_size:            5
angular_thred:          0.3
track_dist:             0.3
# sensor offset
sensor_offset_x:        0.4
sensor_offset_y:        0.0
# smart joystick
joyGoal_scale:          2.5